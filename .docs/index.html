<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuggingFace - LLM Course</title>
    <style>
        /* Force the document to take up the full viewport */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevents unwanted scrollbars */
        }

        /* Make the container fill the body */
        .markmap {
            width: 100vw;
            height: 100vh;
        }

        /* Ensure the SVG inside scales correctly */
        .markmap > svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="markmap">
    <script type="text/template">
        - Transformers
          - Encoder
          - Decoder
          - Seq2Seq
    </script>
</div>

<script>
    window.markmap = {
        autoLoader: {
            toolbar: true, 
        },
        options: {
            initialExpandLevel: 0
        }
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@latest"></script>

</body>
</html>
